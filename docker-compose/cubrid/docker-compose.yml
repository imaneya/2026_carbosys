services:
  cubrid:
    image: cubrid/cubrid:11.2
    environment:
      TZ: Asia/Seoul
      CUBRID_DB: com
      CUBRID_LOCALE: ko_KR.utf8
      DB_ROOT_PASSWORD: "" # dba 계정 비밀번호 (공백 시 dba 접속 가능)
    volumes:
      - "./init/:/docker-entrypoint-initdb.d/"
    platform: linux/x86_64
    ports:
      - "33000:33000"
    container_name: cubrid
    # command: cubrid broker off

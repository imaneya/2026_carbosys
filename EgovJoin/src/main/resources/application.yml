server:
  port: 18003 # Choose a free port
  forward-headers-strategy: native

egov:
  page:
    size: 10
    unit: 10

spring:
  application:
    name: EgovJoin
  main:
    allow-bean-definition-overriding: true
  config:
    import: "optional:configserver:http://localhost:8888"
  profiles:
    active: local
  datasource:
    driver-class-name: cubrid.jdbc.driver.CUBRIDDriver
    url: jdbc:cubrid:localhost:33000:com:::?charset=UTF-8
    username: dba
    password: ""
    hikari:
      maximum-pool-size: 20
  jpa:
    database-platform: org.hibernate.dialect.CUBRIDDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
  messages:
    encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  thymeleaf:
    encoding: UTF-8
    mode: HTML
    cache: false

logging:
  level:
    org:
      egovframe:
        rte: debug
      springframework:
        web: debug
    egovframework:
      com: debug

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    instance:
      instance-id: ${spring.application.name}:${random.value}

Globals:
  auth: security

org:
  egovframe:
    crypto:
      algorithm: SHA-256
      algorithmKey: egovframe
      algorithmKeyHash: gdyYs/IZqY86VcWhT8emCYfqY1ahw2vtLG+/FzNqtrQ=

    security:
      loginUrl: /uat/uia/loginView
      logoutSuccessUrl: /uat/uia/loginView
      loginFailureUrl: /uat/uia/loginFailure
      accessDeniedUrl: /uat/uia/accessDenied
      csrfAccessDeniedUrl: /uat/uia/csrfAccessDenied
      defaultTargetUrl: /main
      dataSource: dataSource
      excludeList: /css/**, /images/**, /js/**, /uss/umt/**, /uat/**
      csrf: false
      xframeOptions: sameorigin
      sniff: false
      xssProtection: true
      cacheControl: false
      concurrentMaxSessons: 1
      errorIfMaximumExceeded: false
      concurrentExpiredUrl: /uat/uia/loginView
      hash: plaintext
      hashBase64: false
      requestMatcherType: ant
      jdbcMapClass: org.egovframe.boot.security.userdetails.DefaultMapUserDetailsMapping
      jdbcUsersByUsernameQuery: >
        SELECT USER_ID, PASSWORD, 'TRUE' AS ENABLED
        FROM COMVNUSERMASTER
        WHERE USER_ID = ?
      jdbcAuthoritiesByUsernameQuery: >
        SELECT A.SCRTY_DTRMN_TRGET_ID USER_ID, A.AUTHOR_CODE AUTHORITY
        FROM MSATNEMPLYRSCRTYESTBS A, COMVNUSERMASTER B WHERE
        A.SCRTY_DTRMN_TRGET_ID = B.ESNTL_ID AND B.USER_ID = ?
      sqlRolesAndUrl: >
        SELECT A.ROLE_PTTRN URL, B.AUTHOR_CODE AUTHORITY
        FROM MSATNROLEINFO A, MSATNAUTHORROLERELATE B
        WHERE A.ROLE_CODE = B.ROLE_CODE  AND A.ROLE_TY = 'url'
        ORDER BY A.ROLE_SORT
      sqlHierarchicalRoles: >
        SELECT A.CHLDRN_ROLE AS CHILD, A.PARNTS_ROLE PARENT
        FROM MSATNROLES_HIERARCHY A LEFT JOIN MSATNROLES_HIERARCHY B ON (A.CHLDRN_ROLE = B.PARNTS_ROLE)
